name: Android Reviews

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install -r requirements.txt

      - name: Run Script
        run: |
          python android.py

      - name: Commit JSON
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add reviews.json

          git commit -m "update reviews" || exit 0

          git push
